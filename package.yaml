name: overlay
version: 0.1.0.0
synopsis: KJV 1769 reader with signed text patches and Strong's lookup
license: MIT
license-file: LICENSE
author: Glendon Klassen
maintainer: gjklassen@proton.me
copyright: 2026 Glendon Klassen
language: GHC2021

ghc-options:
  - -Wall
  - -Wcompat
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wredundant-constraints

dependencies:
  - base >= 4.18 && < 5
  - text
  - bytestring
  - containers
  - vector
  - aeson

# Modules are discovered automatically — no exposed-modules bookkeeping.
library:
  source-dirs: src
  dependencies:
    - monomer
    - lens
    - data-default
    - crypton
    - ram
    - directory
    - filepath
    - time
    - tagsoup

executables:
  overlay:
    main: Main.hs
    source-dirs: app
    dependencies:
      - overlay
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N

  overlay-import:
    main: Import.hs
    source-dirs: tools
    dependencies:
      - overlay
    ghc-options:
      - -threaded

tests:
  overlay-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - overlay
      - hspec
      - filepath
    ghc-options:
      - -threaded
