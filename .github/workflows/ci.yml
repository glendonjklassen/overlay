name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.7']
        cabal: ['3.14']
    steps:
      - uses: actions/checkout@v4

      # Monomer links against SDL2 / OpenGL / FreeType; the library (and thus
      # the test suite, which depends on it) won't link without these.
      - name: Install Monomer system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libsdl2-dev libglew-dev libgl1-mesa-dev libfreetype-dev

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}

      - name: Freeze dependencies (cache key)
        run: cabal freeze --enable-tests

      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc${{ matrix.ghc }}-

      - name: Build (warnings as errors)
        run: cabal build all --enable-tests --ghc-options=-Werror

      - name: Test
        run: cabal test all --enable-tests --test-show-details=direct

  hlint:
    name: hlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up HLint
        uses: haskell-actions/hlint-setup@v2
      - name: Run HLint
        uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "app/", "tools/", "test/"]'
          fail-on: warning
